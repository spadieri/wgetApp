<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>Wget App - Software Installer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-title">Categorie</div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
    </aside>
    <main id="content">
      <header id="header">
        <h1 id="category-title">Browsers & Internet</h1>
        <div class="header-controls">
          <div class="search-wrapper">
            <input type="text" id="search" placeholder="Search software...">
          </div>
          <button id="update-badge" class="update-badge" hidden type="button"></button>
          <button id="open-downloads" class="icon-btn" type="button" title="Open downloads folder">&#128193;</button>
          <div class="lang-toggle">
            <button id="lang-en" class="lang-btn active">EN</button>
            <span class="lang-divider">|</span>
            <button id="lang-it" class="lang-btn">IT</button>
          </div>
        </div>
      </header>
      <div id="cards-grid"></div>
    </main>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
